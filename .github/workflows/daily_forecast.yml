name: Nightly Cashflow Forecast

on:
  schedule:
    # This runs at 00:00 (Midnight) every day
    - cron: '0 0 * * *'
  # This allows you to run it manually to test it
  workflow_dispatch:

jobs:
  run-forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase pandas xgboost prophet joblib scikit-learn python-dotenv

      - name: Execute Forecaster
        env:
          # This maps your GitHub Secrets to the Python os.getenv() calls
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python backend/forecaster.py